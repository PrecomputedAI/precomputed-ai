name: Lint patterns

on:
  push:
    branches: ["main"]
    paths:
      - "patterns/**"
      - "scripts/lint_patterns.py"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "patterns/**"
      - "scripts/lint_patterns.py"
      - ".github/workflows/lint.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pattern lint
        run: python3 scripts/lint_patterns.py
